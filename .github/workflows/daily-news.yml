name: Autonomous News Intelligence — Daily Digest

on:
  schedule:
    - cron: '0 14 * * *'   # 2 PM UTC = 7 AM PDT (summer). Change to '0 15 * * *' for PST (winter).
  workflow_dispatch:         # Manual trigger for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Restore feed state cache
        uses: actions/cache/restore@v4
        with:
          path: feed_state.json
          key: feed-state-v1

      - name: Validate feeds
        run: python validate_feeds.py

      - name: Save feed state cache
        uses: actions/cache/save@v4
        with:
          path: feed_state.json
          key: feed-state-v1

      - name: Run digest pipeline
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python main.py

      - name: Archive digest
        run: python archive.py
